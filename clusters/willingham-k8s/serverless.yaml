---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: serverless
  namespace: flux-system
spec:
  dependsOn:
    - name: operators
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./serverless
  prune: true
  wait: true
  timeout: 5m
