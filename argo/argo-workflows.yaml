---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-workflows-oidc
  namespace: argo
spec:
  refreshInterval: 10m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: argo-workflows-oidc
    creationPolicy: Owner
    template:
      data:
        client-id: "argo-workflows"
        client-secret: "{{ .clientSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: ARGO_WORKFLOWS_OIDC_CLIENT_SECRET
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: argo
spec:
  interval: 10m
  chart:
    spec:
      chart: argo-workflows
      version: "0.47.4"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: argo
      interval: 10m
  values:
    crds:
      install: true
      keep: true
    server:
      authModes:
        - sso
      sso:
        enabled: true
        issuer: https://keycloak.wcloud.sh/realms/wcloud
        clientId:
          name: argo-workflows-oidc
          key: client-id
        clientSecret:
          name: argo-workflows-oidc
          key: client-secret
        redirectUrl: https://argo-workflows.wcloud.sh/oauth2/callback
        scopes:
          - openid
          - profile
          - email
        rbac:
          enabled: false
