---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  interval: 10m
  chart: kgateway
  sourceRef:
    kind: HelmRepository
    name: kgateway-charts
  version: "v2.2.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: kgateway
    namespace: kgateway-system
