apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: jaeger
spec:
  hostnames:
    - jaeger.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: jaeger-collector
          port: 16686
      matches:
        - path:
            type: PathPrefix
            value: /
