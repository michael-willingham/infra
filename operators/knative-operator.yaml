---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: knative-operator
  namespace: knative-operator
spec:
  interval: 1m
  url: https://knative.github.io/operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: knative-operator
  namespace: knative-operator
spec:
  interval: 10m
  chart:
    spec:
      chart: knative-operator
      version: "v1.21.1"
      sourceRef:
        kind: HelmRepository
        name: knative-operator
        namespace: knative-operator
