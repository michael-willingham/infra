---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: percona
  namespace: postgres
spec:
  interval: 1m
  url: https://percona.github.io/percona-helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pg-operator
  namespace: postgres
spec:
  interval: 10m
  chart:
    spec:
      chart: pg-operator
      version: "2.8.2"
      sourceRef:
        kind: HelmRepository
        name: percona
        namespace: postgres
      interval: 10m
  values:
    watchAllNamespaces: true
