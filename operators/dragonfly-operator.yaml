---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: dragonfly-operator
  namespace: dragonfly
spec:
  interval: 12h
  type: oci
  url: oci://ghcr.io/dragonflydb/dragonfly-operator/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: dragonfly
spec:
  interval: 10m
  chart:
    spec:
      chart: dragonfly-operator
      version: "v1.4.0"
      sourceRef:
        kind: HelmRepository
        name: dragonfly-operator
        namespace: dragonfly
      interval: 10m
  values: {}
