---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fairwinds
  namespace: vpa
spec:
  interval: 1m
  url: https://charts.fairwinds.com/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
  namespace: vpa
spec:
  interval: 10m
  chart:
    spec:
      chart: vpa
      version: "4.10.1"
      sourceRef:
        kind: HelmRepository
        name: fairwinds
        namespace: vpa
      interval: 10m
  values:
    metrics-server:
      enabled: false
    admissionController:
      registerWebhook: true
      extraArgs:
        feature-gates: InPlaceOrRecreate=true
    updater:
      extraArgs:
        feature-gates: InPlaceOrRecreate=true
