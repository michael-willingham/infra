---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: dcgm-exporter
  namespace: dcgm-exporter
spec:
  interval: 1m
  url: https://nvidia.github.io/dcgm-exporter/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: dcgm-exporter
spec:
  interval: 10m
  install:
    disableOpenAPIValidation: true
  upgrade:
    disableOpenAPIValidation: true
  chart:
    spec:
      chart: dcgm-exporter
      version: "4.8.1"
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter
        namespace: dcgm-exporter
      interval: 10m
  values:
    runtimeClassName: nvidia
    serviceMonitor:
      enabled: true
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9400"
