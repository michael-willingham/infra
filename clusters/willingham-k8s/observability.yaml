---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
    - name: namespaces
    - name: crds
    - name: operators
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./observability
  prune: true
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: headlamp
      namespace: headlamp
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: vmks
      namespace: vmks
    - apiVersion: apps/v1
      kind: StatefulSet
      name: jaeger-collector
      namespace: jaeger
