---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: tfc-operator-system
spec:
  interval: 12h
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tfc-operator
  namespace: tfc-operator-system
spec:
  interval: 10m
  chart:
    spec:
      chart: hcp-terraform-operator
      version: "2.11.3"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: tfc-operator-system
      interval: 10m
  values: {}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tfc-token
  namespace: tfc-operator-system
spec:
  refreshInterval: 10m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tfc-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: TFC_API_TOKEN
