---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kgateway-charts
  namespace: kgateway-system
spec:
  interval: 5m
  type: oci
  url: oci://cr.kgateway.dev/kgateway-dev/charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: kgateway-crds
  namespace: kgateway-system
spec:
  interval: 10m
  chart: kgateway-crds
  sourceRef:
    kind: HelmRepository
    name: kgateway-charts
  version: "v2.2.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway-crds
  namespace: kgateway-system
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: kgateway-crds
    namespace: kgateway-system
