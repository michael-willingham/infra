---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: temporal
  namespace: temporal
spec:
  hostnames:
    - temporal.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: temporal-web
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
