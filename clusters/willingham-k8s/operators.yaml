---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: operators
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
    - name: namespaces
    - name: crds
    - name: base
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./operators
  prune: true
  wait: false
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: arc-controller
      namespace: arc-systems
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: camel-k
      namespace: camel-k
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: dragonfly-operator
      namespace: dragonfly
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-dns
      namespace: external-dns
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: keda
      namespace: keda
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kgateway
      namespace: kgateway-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: knative-operator
      namespace: knative-operator
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: pg-operator
      namespace: postgres
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: opentelemetry-operator
      namespace: otel-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: strimzi-cluster-operator
      namespace: kafka
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: tailscale
      namespace: tailscale
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: tfc-operator
      namespace: tfc-operator-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: opentelemetry-operator
      namespace: otel-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: vpa
      namespace: vpa
