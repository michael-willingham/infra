version: "3"

vars:
  ESO_NAMESPACE: external-secrets
  SECRET_NAME: infisical-auth-credentials
  INFISICAL_PROJECT_ID: ae7f936f-d637-46e7-837b-90fb6e671d74

tasks:
  bootstrap:eso:
    desc: Create the Infisical auth credentials secret for External Secrets Operator
    summary: |
      Creates the external-secrets namespace (if needed) and the
      infisical-auth-credentials secret used by the ClusterSecretStore.

      Requires the Infisical CLI to be installed and logged in.
      Pulls the Universal Auth client ID and secret from the Infisical project.
    vars:
      CLIENT_ID:
        sh: infisical secrets get INFISICAL_MACHINE_CLIENT_ID --projectId={{.INFISICAL_PROJECT_ID}} --env=prod --plain --silent
      CLIENT_SECRET:
        sh: infisical secrets get INFISICAL_MACHINE_CLIENT_SECRET --projectId={{.INFISICAL_PROJECT_ID}} --env=prod --plain --silent
    preconditions:
      - sh: command -v infisical
        msg: "infisical CLI is not installed. Install it from https://infisical.com/docs/cli/overview"
      - sh: command -v kubectl
        msg: "kubectl is not installed"
      - sh: kubectl cluster-info --request-timeout=5s 2>/dev/null
        msg: "Cannot reach Kubernetes cluster. Is Tailscale connected?"
    cmds:
      - kubectl create namespace {{.ESO_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label namespace {{.ESO_NAMESPACE}} pod-security.kubernetes.io/audit=privileged pod-security.kubernetes.io/enforce=privileged pod-security.kubernetes.io/warn=privileged --overwrite
      - |
        kubectl create secret generic {{.SECRET_NAME}} \
          -n {{.ESO_NAMESPACE}} \
          --from-literal=clientId={{.CLIENT_ID}} \
          --from-literal=clientSecret={{.CLIENT_SECRET}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - echo "Bootstrap complete. Secret '{{.SECRET_NAME}}' created in namespace '{{.ESO_NAMESPACE}}'."

  keycloak:create-client:
    desc: Create an OIDC client in the wcloud Keycloak realm
    summary: |
      Creates a confidential OIDC client in the wcloud realm:
        1. Generates a random client secret
        2. Stores it in Infisical as <UPPER_SNAKE_CLIENT_ID>_OIDC_CLIENT_SECRET
        3. Creates the client in Keycloak via kcadm.sh
        4. Adds a groups protocol mapper

      Usage: task keycloak:create-client -- <client-id> <redirect-uri> [web-origin]

      Example:
        task keycloak:create-client -- my-app https://my-app.wcloud.sh/callback https://my-app.wcloud.sh
    vars:
      CLIENT_ID: "{{.CLI_ARGS | splitList \" \" | first}}"
      REDIRECT_URI: '{{if ge (len (splitList " " .CLI_ARGS)) 2}}{{index (splitList " " .CLI_ARGS) 1}}{{else}}{{end}}'
      WEB_ORIGIN: '{{if ge (len (splitList " " .CLI_ARGS)) 3}}{{index (splitList " " .CLI_ARGS) 2}}{{else}}{{end}}'
      INFISICAL_KEY: '{{.CLIENT_ID | upper | replace "-" "_"}}_OIDC_CLIENT_SECRET'
      SECRET:
        sh: openssl rand -base64 32 | tr -d '\n'
      KC_POD:
        sh: kubectl get pods -n keycloak -l app=keycloak --no-headers -o name | head -1
      KC_ADMIN_PASSWORD:
        sh: infisical secrets get KC_ADMIN_PASSWORD --projectId={{.INFISICAL_PROJECT_ID}} --env=prod --plain --silent
    preconditions:
      - sh: command -v infisical
        msg: "infisical CLI is not installed"
      - sh: command -v kubectl
        msg: "kubectl is not installed"
      - sh: kubectl cluster-info --request-timeout=5s 2>/dev/null
        msg: "Cannot reach Kubernetes cluster. Is Tailscale connected?"
      - sh: test -n "{{.CLIENT_ID}}"
        msg: "Usage: task keycloak:create-client -- <client-id> <redirect-uri> [web-origin]"
      - sh: test -n "{{.REDIRECT_URI}}"
        msg: "Usage: task keycloak:create-client -- <client-id> <redirect-uri> [web-origin]"
      - sh: test -n "{{.KC_POD}}"
        msg: "No Keycloak pod found in keycloak namespace. Is Keycloak running?"
    prompt: "Create Keycloak client '{{.CLIENT_ID}}' and store secret as {{.INFISICAL_KEY}} in Infisical?"
    cmds:
      - >-
        infisical secrets set {{.INFISICAL_KEY}}="{{.SECRET}}"
        --projectId={{.INFISICAL_PROJECT_ID}} --env=prod
      - >-
        kubectl exec -n keycloak {{.KC_POD}} --
        /opt/keycloak/bin/kcadm.sh config credentials
        --server http://localhost:8080 --realm master
        --user administrator --password '{{.KC_ADMIN_PASSWORD}}'
      - >-
        kubectl exec -n keycloak {{.KC_POD}} --
        /opt/keycloak/bin/kcadm.sh create clients -r wcloud
        -s clientId={{.CLIENT_ID}}
        -s enabled=true
        -s protocol=openid-connect
        -s publicClient=false
        -s standardFlowEnabled=true
        -s directAccessGrantsEnabled=false
        -s serviceAccountsEnabled=false
        -s 'secret={{.SECRET}}'
        -s 'redirectUris=["{{.REDIRECT_URI}}"]'
        -s 'webOrigins=[{{if .WEB_ORIGIN}}"{{.WEB_ORIGIN}}"{{end}}]'
        -s 'defaultClientScopes=["openid","profile","email","groups"]'
      - |
        CLIENT_UUID=$(kubectl exec -n keycloak {{.KC_POD}} -- \
          /opt/keycloak/bin/kcadm.sh get clients -r wcloud \
          -q clientId={{.CLIENT_ID}} --fields id --format csv --noquotes | tail -1)
        if [ -z "$CLIENT_UUID" ]; then
          echo "Error: Failed to retrieve client UUID for clientId '{{.CLIENT_ID}}'. Client may not have been created or lookup returned no results." >&2
          exit 1
        fi
        kubectl exec -n keycloak {{.KC_POD}} -- \
          /opt/keycloak/bin/kcadm.sh create clients/$CLIENT_UUID/protocol-mappers/models -r wcloud \
          -s name=groups \
          -s protocol=openid-connect \
          -s protocolMapper=oidc-group-membership-mapper \
          -s 'config."claim.name"=groups' \
          -s 'config."full.path"=false' \
          -s 'config."id.token.claim"=true' \
          -s 'config."access.token.claim"=true' \
          -s 'config."userinfo.token.claim"=true'
      - echo "Client '{{.CLIENT_ID}}' created. Secret stored in Infisical as {{.INFISICAL_KEY}}."
      - echo "Remember to add the ExternalSecret and update docs/secrets-management.md."
