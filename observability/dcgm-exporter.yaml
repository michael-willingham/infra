---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: dcgm-exporter
  namespace: dcgm-exporter
spec:
  interval: 1m
  url: https://nvidia.github.io/dcgm-exporter/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: dcgm-exporter
spec:
  interval: 10m
  chart:
    spec:
      chart: dcgm-exporter
      version: "4.8.1"
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter
        namespace: dcgm-exporter
      interval: 10m
  values:
    runtimeClassName: nvidia
    serviceMonitor:
      enabled: true
      interval: 15s
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-gpu-dashboard
  namespace: vmks
  labels:
    grafana_dashboard: "1"
data:
  gpu-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "GPU Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Temperature",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 70, "color": "yellow" },
                  { "value": 85, "color": "red" }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Memory Used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}} used"
            }
          ]
        },
        {
          "title": "GPU Memory Free",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_FREE{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}} free"
            }
          ]
        },
        {
          "title": "Power Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "SM Clock Speed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "clockHz",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_SM_CLOCK{exported_namespace=~\"$namespace\", Hostname=~\"$node\"} * 1000000",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "Memory Clock Speed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "clockHz",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_MEM_CLOCK{exported_namespace=~\"$namespace\", Hostname=~\"$node\"} * 1000000",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "Memory Copy Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_MEM_COPY_UTIL{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "{{Hostname}} / GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Overview",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Temperature" },
                "properties": [{ "id": "unit", "value": "celsius" }]
              },
              {
                "matcher": { "id": "byName", "options": "Utilization" },
                "properties": [{ "id": "unit", "value": "percent" }]
              },
              {
                "matcher": { "id": "byName", "options": "Memory Used" },
                "properties": [{ "id": "unit", "value": "decmbytes" }]
              },
              {
                "matcher": { "id": "byName", "options": "Power" },
                "properties": [{ "id": "unit", "value": "watt" }]
              }
            ]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "Value #Temperature": "Temperature",
                  "Value #Utilization": "Utilization",
                  "Value #Memory Used": "Memory Used",
                  "Value #Power": "Power"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "Temperature"
            },
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "Utilization"
            },
            {
              "expr": "DCGM_FI_DEV_FB_USED{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "Memory Used"
            },
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{exported_namespace=~\"$namespace\", Hostname=~\"$node\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "Power"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["nvidia", "gpu", "dcgm"],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(DCGM_FI_DEV_GPU_TEMP, exported_namespace)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "hide": 0
          },
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(DCGM_FI_DEV_GPU_TEMP, Hostname)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "hide": 0
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "GPU Monitoring (DCGM)",
      "uid": "gpu-dcgm-monitoring"
    }
