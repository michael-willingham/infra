---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rabbitmq
  namespace: rabbitmq
spec:
  hostnames:
    - rabbitmq.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: rabbitmq-cluster
          port: 15672
      matches:
        - path:
            type: PathPrefix
            value: /
