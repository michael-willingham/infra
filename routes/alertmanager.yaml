apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: vmks
spec:
  hostnames:
    - alerts.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: vmalertmanager-vmks-victoria-metrics-k8s-stack
          port: 9093
      matches:
        - path:
            type: PathPrefix
            value: /
