apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: victoria-metrics
  namespace: vmks
spec:
  hostnames:
    - metrics.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: vmsingle-vmks-victoria-metrics-k8s-stack
          port: 8428
      matches:
        - path:
            type: PathPrefix
            value: /
