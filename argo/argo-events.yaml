---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-events
  namespace: argo
spec:
  interval: 10m
  chart:
    spec:
      chart: argo-events
      version: "2.4.20"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: argo
      interval: 10m
  values:
    crds:
      install: true
      keep: true
