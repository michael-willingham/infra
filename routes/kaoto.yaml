---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kaoto
  namespace: camel-k
spec:
  hostnames:
    - camel.wcloud.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: kaoto
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
