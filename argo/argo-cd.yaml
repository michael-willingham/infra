---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: argo
  namespace: argo
spec:
  interval: 1m
  url: https://argoproj.github.io/argo-helm
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argo
spec:
  refreshInterval: 10m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: argocd-oidc
    creationPolicy: Owner
  data:
    - secretKey: oidc.clientSecret
      remoteRef:
        key: ARGOCD_OIDC_CLIENT_SECRET
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-cd
  namespace: argo
spec:
  interval: 10m
  chart:
    spec:
      chart: argo-cd
      version: "9.4.6"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: argo
      interval: 10m
  valuesFrom:
    - kind: Secret
      name: argocd-oidc
      valuesKey: oidc.clientSecret
      targetPath: configs.secret.extra.oidc\.clientSecret
  values:
    configs:
      cm:
        oidc.config: |
          name: Keycloak
          issuer: https://keycloak.wcloud.sh/realms/wcloud
          clientID: argo-cd
          clientSecret: $oidc.clientSecret
          requestedScopes:
            - openid
            - profile
            - email
        url: https://argo-cd.wcloud.sh
      params:
        server.insecure: true
      rbac:
        policy.default: role:admin
    dex:
      enabled: false
