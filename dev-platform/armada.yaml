---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gresearch
  namespace: armada-system
spec:
  interval: 1h
  url: https://g-research.github.io/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: armada-operator
  namespace: armada-system
spec:
  interval: 10m
  chart:
    spec:
      chart: armada-operator
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: gresearch
        namespace: armada-system
      interval: 10m
  values: {}
