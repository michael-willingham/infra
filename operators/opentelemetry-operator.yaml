---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-telemetry
  namespace: otel-system
spec:
  interval: 1m
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: otel-system
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-operator
      version: "0.106.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: otel-system
      interval: 10m
  values:
    admissionWebhooks:
      certManager:
        enabled: true
