---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: strimzi
  namespace: kafka
spec:
  interval: 1m
  url: https://strimzi.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-cluster-operator
  namespace: kafka
spec:
  interval: 10m
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: "0.50.1"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: kafka
      interval: 10m
  values:
    watchAnyNamespace: true
