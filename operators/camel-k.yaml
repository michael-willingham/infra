---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: camel-k
  namespace: camel-k
spec:
  interval: 1m
  url: https://apache.github.io/camel-k/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: camel-k
  namespace: camel-k
spec:
  interval: 10m
  chart:
    spec:
      chart: camel-k
      version: "2.9.1"
      sourceRef:
        kind: HelmRepository
        name: camel-k
        namespace: camel-k
      interval: 10m
  values:
    operator:
      global: "true"
